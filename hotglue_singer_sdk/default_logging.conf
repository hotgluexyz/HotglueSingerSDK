# Shared default for Singer taps/targets using hotglue-singer-sdk.
# hotglue_singer_sdk sets LOGGING_CONF_FILE to this file on import unless already set.
# To use a different file, set LOGGING_CONF_FILE before importing hotglue_singer_sdk.
#
# For a richer local layout, change formatter=child to formatter=verbose in both [logger_root] and [handler_stderr].
# Job-aware formatters: see hotglue_singer_sdk.logging_conf (JOB_ID / JOB).

[loggers]
keys=root

[handlers]
keys=stderr

[formatters]
keys=child,verbose

[logger_root]
level=INFO
handlers=stderr
formatter=child
propagate=0

[handler_stderr]
level=INFO
class=StreamHandler
formatter=child
args=(sys.stderr,)

# JobAwareSingerFormatter: time= omitted when JOB_ID is set (Hotglue job).
[formatter_child]
class=hotglue_singer_sdk.logging_conf.JobAwareSingerFormatter

# JobAwareVerboseFormatter: leading timestamp omitted when JOB is set.
[formatter_verbose]
class=hotglue_singer_sdk.logging_conf.JobAwareVerboseFormatter
