# Shared default for Singer taps/targets using hotglue-singer-sdk.
# Use with pipelinewise-singer-python (LOGGING_CONF_FILE must be set before Python starts):
#
#   export LOGGING_CONF_FILE="$(python -c 'from hotglue_singer_sdk.logging_conf import default_logging_conf_path; print(default_logging_conf_path())')"
#
# Or in Docker / CI, copy this file to a fixed path and set LOGGING_CONF_FILE to that absolute path.
#
# For a richer local layout, change formatter=child to formatter=verbose in both [logger_root] and [handler_stderr].
# When JOB is set (Hotglue job), ``time=`` / leading timestamps are omitted (see logging_conf.JobAware*Formatter).

[loggers]
keys=root

[handlers]
keys=stderr

[formatters]
keys=child,verbose

[logger_root]
level=INFO
handlers=stderr
formatter=child
propagate=0

[handler_stderr]
level=INFO
class=StreamHandler
formatter=child
args=(sys.stderr,)

# Same fields as pipelinewise singer/logging.conf; time= only when JOB is unset.
[formatter_child]
class=hotglue_singer_sdk.logging_conf.JobAwareSingerFormatter

# Optional: ms timestamp and call site; leading timestamp only when JOB is unset.
[formatter_verbose]
class=hotglue_singer_sdk.logging_conf.JobAwareVerboseFormatter
